<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsSafe AI - Image Safety Classifier</title>

<style>
:root {
    --safe-green: #22c55e;
    --unsafe-red: #ef4444;
    --primary: #6366f1;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
}
header {
    background: linear-gradient(135deg,#1e1b4b,#312e81,#1e293b);
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo { display:flex; gap:.75rem; align-items:center; }
.logo-icon {
    width:44px;height:44px;
    background:linear-gradient(135deg,var(--primary),#a78bfa);
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
}
.model-badge {
    background:rgba(34,197,94,.15);
    border:1px solid rgba(34,197,94,.4);
    color:var(--safe-green);
    padding:.35rem .85rem;
    border-radius:999px;
    font-size:.8rem;
}
main { max-width:900px; margin:auto; padding:2rem; }
.card {
    background:var(--card);
    border-radius:16px;
    padding:1.5rem;
    margin-bottom:1.5rem;
}
#drop-zone {
    border:2px dashed #475569;
    border-radius:12px;
    padding:3rem;
    text-align:center;
    cursor:pointer;
}
#file-input { display:none; }
#preview-container { display:none; margin-top:1rem; }
#preview-container.visible { display:block; }
.btn {
    background:var(--primary);
    color:white;
    padding:.75rem;
    border:none;
    border-radius:8px;
    width:100%;
    cursor:pointer;
}
.result-safe {
    border:2px solid var(--safe-green);
    background:rgba(34,197,94,.1);
}
.result-unsafe {
    border:2px solid var(--unsafe-red);
    background:rgba(239,68,68,.1);
}
.confidence-bar {
    height:8px;
    background:#334155;
    border-radius:4px;
    overflow:hidden;
    margin:1rem 0;
}
.confidence-fill {
    height:100%;
}
.confidence-fill.safe { background:var(--safe-green); }
.confidence-fill.unsafe { background:var(--unsafe-red); }
.loading { display:none; text-align:center; }
.loading.visible { display:block; }
</style>
</head>

<body>

<header>
    <div class="logo">
        <div class="logo-icon">🛡️</div>
        <h2>KidsSafe AI</h2>
    </div>
    <div class="model-badge">ML Model Active</div>
</header>

<main>

<div class="card">
    <h3>Upload Image</h3>
    <div id="drop-zone" onclick="fileInput.click()">Click to upload image</div>
    <input type="file" id="file-input" accept="image/*">

    <div id="preview-container">
        <img id="preview-img" style="max-width:100%;max-height:300px;border-radius:8px;">
        <button class="btn" onclick="analyzeImage()">Analyze Image</button>
    </div>
</div>

<div class="loading" id="loading">
    <p>Analyzing...</p>
</div>

<div class="card" id="result-panel" style="display:none;">
    <h3 id="result-title"></h3>
    <p id="result-subtitle"></p>

    <div class="confidence-bar">
        <div id="confidence-fill" class="confidence-fill"></div>
    </div>

    <p style="text-align:center;">
        <span id="confidence-text"></span> confidence
    </p>

    <hr style="margin:1rem 0;border-color:#334155;">

    <p>Safe Probability: <span id="safe-prob"></span></p>
    <p>Unsafe Probability: <span id="unsafe-prob"></span></p>
</div>

</main>

<script>

const fileInput = document.getElementById("file-input");
const previewContainer = document.getElementById("preview-container");
const previewImg = document.getElementById("preview-img");
const resultPanel = document.getElementById("result-panel");
const loading = document.getElementById("loading");

let selectedFile = null;

fileInput.addEventListener("change", function(e){
    selectedFile = e.target.files[0];
    if(selectedFile){
        const reader = new FileReader();
        reader.onload = function(ev){
            previewImg.src = ev.target.result;
            previewContainer.classList.add("visible");
        }
        reader.readAsDataURL(selectedFile);
    }
});

async function analyzeImage(){

    if(!selectedFile) return;

    loading.classList.add("visible");
    resultPanel.style.display = "none";

    const formData = new FormData();
    formData.append("image", selectedFile);   // ✅ FIXED KEY NAME

    try{
        const response = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        const result = await response.json();
        loading.classList.remove("visible");

        if(result.error){
            alert(result.error);
            return;
        }

        displayResult(result);

    }catch(err){
        loading.classList.remove("visible");
        alert("Error: " + err.message);
    }
}

function displayResult(result){

    const isSafe = result.is_safe;

    resultPanel.style.display = "block";
    resultPanel.className = "card " + (isSafe ? "result-safe" : "result-unsafe");

    document.getElementById("result-title").textContent = result.category;
    document.getElementById("result-subtitle").textContent =
        isSafe ? "Image is appropriate for children"
               : "Image may not be appropriate for children";

    const confidenceFill = document.getElementById("confidence-fill");
    confidenceFill.className = "confidence-fill " + (isSafe ? "safe" : "unsafe");
    confidenceFill.style.width = result.confidence + "%";

    document.getElementById("confidence-text").textContent = result.confidence + "%";
    document.getElementById("safe-prob").textContent = result.safe_probability + "%";
    document.getElementById("unsafe-prob").textContent = result.unsafe_probability + "%";
}

</script>

</body>
</html>
